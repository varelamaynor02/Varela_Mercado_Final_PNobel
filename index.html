<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataTables.js</title>

    <!-- 1. Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- 2. DataTables CSS para Bootstrap 5 -->
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/2.3.7/css/dataTables.bootstrap5.min.css"
    />

    <!-- 3. Font Awesome — iconos para botones y estados -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- 4. Mi CSS personalizado -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-sm-12">
          <table id="datatable_pnobel" class="table">
            <thead>
              <tr>
                <th class="centered">#</th>
                <th class="centered">#</th>
                <th class="centered">#</th>
                <th class="centered">#</th>
                <th class="centered">#</th>
              </tr>
            </thead>
            <tbody id="tableBody_pnobel"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 4. Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- 5. jQuery — SIEMPRE antes de DataTables -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- 6. DataTables JS -->
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>

    <!-- 7. DataTables integración con Bootstrap 5 -->
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.bootstrap5.min.js"></script>

    <!-- 8. Nuestro archivo JS -->
    <script src="dataTable.js"></script>
  </body>
</html>
